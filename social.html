<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generador Redes Sociales · Atlético Norte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--b2:#0b1422;--b3:#131f33;--bd:#1a2d45;
  --t:#eef2f8;--m:#7a96b4;--ac:#0ea5e9;--rd:#c8102e;--gl:#f59e0b;--gn:#10b981;
  --r:12px;
}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;min-height:100vh;padding:0 0 60px}

/* ── TOP BAR ── */
.topbar{background:linear-gradient(135deg,#070f20,#0c1d38);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:14px}
.topbar-logo{width:42px;height:50px;flex-shrink:0}
.topbar-info{flex:1}
.topbar-title{font-size:18px;font-weight:900;letter-spacing:-.3px}
.topbar-title span{color:var(--rd)}
.topbar-sub{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

/* ── CONTROLS ── */
.controls{padding:16px;display:flex;flex-direction:column;gap:12px;max-width:700px;margin:0 auto}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap}
.ctrl-group{flex:1;min-width:140px}
.ctrl-label{font-size:10px;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
select,input[type=text]{width:100%;background:var(--b3);border:1px solid var(--bd);color:var(--t);padding:9px 12px;border-radius:9px;font-size:13px;font-weight:600;-webkit-appearance:none;appearance:none}
.btn-gen{background:linear-gradient(135deg,var(--rd),#e8192d);color:#fff;border:none;padding:13px 24px;border-radius:11px;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 18px rgba(200,16,46,.4);width:100%}
.btn-dl{background:linear-gradient(135deg,var(--gn),#059669);color:#fff;border:none;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;display:none;width:100%;margin-top:8px}
.btn-copy{background:linear-gradient(135deg,var(--gl),#d97706);color:#fff;border:none;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;display:none;width:100%;margin-top:6px}

/* ── TEMPLATE PICKER ── */
.tpl-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tpl-row::-webkit-scrollbar{display:none}
.tpl-btn{flex-shrink:0;background:var(--b3);border:2px solid var(--bd);color:var(--m);padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s}
.tpl-btn.active{background:var(--rd);border-color:var(--rd);color:#fff}

/* ── PREVIEW AREA ── */
.preview-wrap{display:flex;justify-content:center;padding:16px;max-width:700px;margin:0 auto}
#previewCanvas{border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100%;max-height:70vh;object-fit:contain}

/* ── MATCH SELECTOR ── */
.match-list{max-width:700px;margin:0 auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.match-item{background:var(--b2);border:1px solid var(--bd);border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.match-item.sel{border-color:var(--rd);background:rgba(200,16,46,.08)}
.match-item:active{opacity:.7}
.mi-teams{flex:1;font-size:12px;font-weight:700}
.mi-meta{font-size:10px;color:var(--m);margin-top:2px}
.mi-chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.match-item.sel .mi-chk{background:var(--rd);border-color:var(--rd)}

.sec-title{font-size:10px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;padding:14px 16px 6px;max-width:700px;margin:0 auto}
.status-msg{text-align:center;padding:10px;font-size:12px;color:var(--m)}
</style>
</head>
<body>

<div class="topbar">
  <canvas class="topbar-logo" id="topLogo" width="42" height="50"></canvas>
  <div class="topbar-info">
    <div class="topbar-title">Atlético <span>Norte</span> F.C</div>
    <div class="topbar-sub">Generador de contenido para redes sociales</div>
  </div>
</div>

<!-- TEMPLATE SELECTOR -->
<div class="sec-title">Plantilla</div>
<div class="controls" style="padding-top:0">
  <div class="tpl-row" id="tplRow">
    <button class="tpl-btn active" onclick="setTpl('jornada',this)">🗓 Jornada</button>
    <button class="tpl-btn" onclick="setTpl('partido',this)">⚽ Partido</button>
    <button class="tpl-btn" onclick="setTpl('tabla',this)">📊 Tabla</button>
    <button class="tpl-btn" onclick="setTpl('resultado',this)">🏆 Resultado</button>
  </div>

  <!-- OPTIONS -->
  <div class="ctrl-row">
    <div class="ctrl-group">
      <div class="ctrl-label">Semana</div>
      <select id="selWeek" onchange="loadMatches()">
        <option value="all">Todas</option>
      </select>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Vuelta</div>
      <select id="selVu" onchange="loadMatches()">
        <option value="0">Todas</option>
        <option value="1">Vuelta 1</option>
        <option value="2">Vuelta 2</option>
        <option value="3">Vuelta 3</option>
      </select>
    </div>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-group">
      <div class="ctrl-label">Hashtags</div>
      <input type="text" id="hashInput" value="#AtléticoNorte #LigaInterna #FútbolLocal #NorteDeSantander" />
    </div>
  </div>

  <button class="btn-gen" onclick="generate()">⚡ Generar Imagen</button>
  <button class="btn-dl" id="btnDl" onclick="download()">⬇️ Descargar PNG</button>
  <button class="btn-copy" id="btnCopy" onclick="copyCaption()">📋 Copiar Caption</button>
</div>

<!-- MATCH LIST -->
<div class="sec-title" id="matchSecTitle">Seleccionar Partidos</div>
<div class="match-list" id="matchList"><div class="status-msg">Cargando fixture...</div></div>

<!-- CANVAS PREVIEW -->
<div class="sec-title" id="prevTitle" style="display:none">Vista Previa (9:16 — 1080×1920)</div>
<div class="preview-wrap"><canvas id="previewCanvas" width="1080" height="1920" style="display:none"></canvas></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const FB={
  apiKey:"AIzaSyDmKfqnPmEkKmXFwR6GAL39L0N-kHKQx_A",
  authDomain:"atletico-norte.firebaseapp.com",
  databaseURL:"https://atletico-norte-default-rtdb.firebaseio.com",
  projectId:"atletico-norte",
  storageBucket:"atletico-norte.firebasestorage.app",
  messagingSenderId:"383457224555",
  appId:"1:383457224555:web:bc43b5f866c574ca028e2e"
};

const app=firebase.initializeApp(FB);
const db=firebase.database(app);

let custBadges={},clubLogo=null,allMatches=[],results={},curTpl='jornada';
let selectedMatches=new Set();

// Load from Firebase
db.ref("/teamBadges").on("value",s=>{custBadges=s.val()||{};buildTopLogo();});
db.ref("/clubLogo").on("value",s=>{clubLogo=s.val();buildTopLogo();});
db.ref("/resultados").on("value",s=>{results=s.val()||{};});

// Team names
const TEAMS={
  1:{n:"Atlético Nacional",s:"NAL"},2:{n:"Deportivo Cali",s:"CAL"},
  3:{n:"Cúcuta Deportivo",s:"CUC"},4:{n:"Atlético Bucaramanga",s:"BUC"},
  5:{n:"América de Cali",s:"AME"},6:{n:"Junior F.C.",s:"JUN"},
  7:{n:"Independiente Santa Fe",s:"SNF"},8:{n:"Inter de Bogotá",s:"INT"},
  9:{n:"Millonarios",s:"MIL"},10:{n:"Deportivo Tolima",s:"TOL"}
};
function tn(id){return TEAMS[id]?TEAMS[id].n:"Equipo "+id}
function ts(id){return TEAMS[id]?TEAMS[id].s:"T"+id}

// Load fixture from main app's Firebase (same RC structure)
// We'll fetch via a public URL or embed the fixture
const FIXTURE_URL="https://biocolombiaplus-max.github.io/registro-evento/";

// Simpler: embed the fixture data directly (same as main app)
// Week dates derived from START_DATE = 2026-07-13
function getWeekDates(){
  const start=new Date("2026-07-13T12:00:00");
  const dates=[];
  for(let w=1;w<=19;w++) dates.push(w);
  return dates;
}

// Fetch index.html to extract RC and DATES constants
async function fetchFixture(){
  try{
    const r=await fetch(FIXTURE_URL);
    const html=await r.text();
    // Extract RC and DATES from the HTML
    const rcMatch=html.match(/const RC=(\[[\s\S]*?\]);/);
    const dtMatch=html.match(/const DATES=(\{[\s\S]*?\});/);
    const hrMatch=html.match(/const HOURS=(\[[\s\S]*?\]);/);
    const caMatch=html.match(/const CANCHAS=(\[[\s\S]*?\]);/);
    if(rcMatch&&dtMatch&&hrMatch&&caMatch){
      const RC=JSON.parse(rcMatch[1]);
      const DATES=JSON.parse(dtMatch[1]);
      const HOURS=JSON.parse(hrMatch[1]);
      const CANCHAS=JSON.parse(caMatch[1]);
      allMatches=RC.map(r=>({id:r[0],fecha:DATES[r[1]],hora:HOURS[r[2]],cancha:CANCHAS[r[3]],l:r[4],v:r[5],vu:r[6],festivo:!!r[7],week:r[8]}));
      buildWeekSelect();
      loadMatches();
    }
  }catch(e){
    document.getElementById("matchList").innerHTML='<div class="status-msg">⚠️ Conecta desde fixture.cesarcreps.com para cargar el fixture</div>';
  }
}
fetchFixture();

function buildWeekSelect(){
  const weeks=[...new Set(allMatches.map(m=>m.week))].sort((a,b)=>a-b);
  const sel=document.getElementById("selWeek");
  sel.innerHTML='<option value="all">Todas</option>'+weeks.map(w=>`<option value="${w}">Semana ${w}</option>`).join('');
  // Auto-select current/next week
  const today=new Date();
  const upcoming=allMatches.filter(m=>new Date(m.fecha+"T12:00:00")>=today);
  if(upcoming.length>0){
    const nextWeek=upcoming[0].week;
    sel.value=nextWeek;
  }
}

function loadMatches(){
  const wk=document.getElementById("selWeek").value;
  const vu=parseInt(document.getElementById("selVu").value);
  let ms=allMatches.filter(m=>{
    const wOk=wk==="all"||m.week===parseInt(wk);
    const vOk=vu===0||m.vu===vu;
    return wOk&&vOk;
  });
  selectedMatches=new Set(ms.map(m=>m.id));
  renderMatchList(ms);
}

function renderMatchList(ms){
  const el=document.getElementById("matchList");
  if(!ms.length){el.innerHTML='<div class="status-msg">Sin partidos para este filtro</div>';return;}
  // Group by date
  const byDate={};
  ms.forEach(m=>{if(!byDate[m.fecha])byDate[m.fecha]=[];byDate[m.fecha].push(m);});
  let h='';
  Object.keys(byDate).sort().forEach(dt=>{
    const d=new Date(dt+"T12:00:00");
    const dayName=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()];
    const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    h+=`<div style="font-size:10px;font-weight:800;color:var(--gl);letter-spacing:1px;padding:8px 0 4px;text-transform:uppercase">${dayName} ${d.getDate()} ${months[d.getMonth()]}</div>`;
    byDate[dt].forEach(m=>{
      const sel=selectedMatches.has(m.id);
      const r=results[m.id];
      const scored=r&&r.l!==undefined;
      h+=`<div class="match-item${sel?' sel':''}" onclick="toggleMatch(${m.id},this)">
        <div class="mi-chk">${sel?'✓':''}</div>
        <div style="flex:1">
          <div class="mi-teams">${tn(m.l)} <span style="color:var(--m)">vs</span> ${tn(m.v)}</div>
          <div class="mi-meta">${m.hora} · ${m.cancha} · V${m.vu}${scored?' · <span style="color:var(--gn)">'+r.l+'-'+r.v+'</span>':''}</div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=h;
}

function toggleMatch(id,el){
  if(selectedMatches.has(id)){selectedMatches.delete(id);el.classList.remove("sel");el.querySelector(".mi-chk").textContent="";}
  else{selectedMatches.add(id);el.classList.add("sel");el.querySelector(".mi-chk").textContent="✓";}
}

function setTpl(t,btn){
  curTpl=t;
  document.querySelectorAll(".tpl-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ── CANVAS GENERATION ──
const W=1080,H=1920;
let generatedCaption="";

function generate(){
  const cv=document.getElementById("previewCanvas");
  const ctx=cv.getContext("2d");
  const ms=allMatches.filter(m=>selectedMatches.has(m.id));
  if(!ms.length){alert("Selecciona al menos un partido");return;}

  if(curTpl==="jornada")drawJornada(ctx,ms);
  else if(curTpl==="partido")drawPartido(ctx,ms[0]);
  else if(curTpl==="tabla")drawTabla(ctx);
  else if(curTpl==="resultado")drawResultado(ctx,ms[0]);

  cv.style.display="block";
  document.getElementById("prevTitle").style.display="block";
  document.getElementById("btnDl").style.display="block";
  document.getElementById("btnCopy").style.display="block";
  cv.scrollIntoView({behavior:"smooth",block:"center"});
}

function buildGrad(ctx,colors){
  const g=ctx.createLinearGradient(0,0,0,H);
  colors.forEach((c,i)=>g.addColorStop(i/(colors.length-1),c));
  return g;
}

function drawBase(ctx){
  // BG gradient
  ctx.fillStyle=buildGrad(ctx,["#040a14","#08101e","#050e1c","#040a14"]);
  ctx.fillRect(0,0,W,H);
  // Subtle grid
  ctx.strokeStyle="rgba(255,255,255,.025)";ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Red accent line top
  const rg=ctx.createLinearGradient(0,0,W,0);
  rg.addColorStop(0,"transparent");rg.addColorStop(.3,"#c8102e");rg.addColorStop(.7,"#c8102e");rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,6);
  // Glow circle
  const cg=ctx.createRadialGradient(W/2,H*.15,0,W/2,H*.15,500);
  cg.addColorStop(0,"rgba(200,16,46,.12)");cg.addColorStop(1,"transparent");
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
}

function drawClubHeader(ctx,y=80){
  // Club logo
  const sh=100,sw=86;
  if(clubLogo){
    const img=new Image();img.src=clubLogo;
    ctx.drawImage(img,W/2-sw/2,y,sw,sh);
  }else{
    // Fallback shield shape
    ctx.fillStyle="#c8102e";ctx.beginPath();
    ctx.roundRect(W/2-43,y,86,100,10);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 36px sans-serif";ctx.textAlign="center";
    ctx.fillText("AN",W/2,y+62);
  }
  // Club name
  ctx.textAlign="center";
  ctx.font="bold 28px -apple-system,sans-serif";
  ctx.fillStyle="#fff";ctx.letterSpacing="4px";
  ctx.fillText("ATLÉTICO NORTE F.C.",W/2,y+sh+38);
  ctx.font="600 22px sans-serif";ctx.fillStyle="#7a96b4";ctx.letterSpacing="3px";
  ctx.fillText("LIGA INTERNA · S2 2026",W/2,y+sh+70);
  // Divider
  const dg=ctx.createLinearGradient(0,0,W,0);
  dg.addColorStop(0,"transparent");dg.addColorStop(.5,"rgba(200,16,46,.8)");dg.addColorStop(1,"transparent");
  ctx.fillStyle=dg;ctx.fillRect(120,y+sh+90,W-240,2);
}

function drawTeamBadge(ctx,tid,cx,cy,size=90){
  const img_data=custBadges[tid];
  if(img_data){
    const img=new Image();img.src=img_data;
    ctx.drawImage(img,cx-size/2,cy-size/2,size,size);
  }else{
    ctx.fillStyle="rgba(255,255,255,.06)";
    ctx.beginPath();ctx.arc(cx,cy,size/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.5)";ctx.font=`bold ${size*.28}px sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(ts(tid),cx,cy);ctx.textBaseline="alphabetic";
  }
}

function drawMatchCard(ctx,m,y,cardH=200,accent=false){
  const r=results[m.id];const scored=r&&r.l!==undefined;
  const mx=80,mw=W-160;
  // Card BG
  const cg=ctx.createLinearGradient(mx,y,mx+mw,y);
  if(accent){cg.addColorStop(0,"rgba(200,16,46,.15)");cg.addColorStop(1,"rgba(14,165,233,.1)");}
  else{cg.addColorStop(0,"rgba(255,255,255,.05)");cg.addColorStop(1,"rgba(255,255,255,.03)");}
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.roundRect(mx,y,mw,cardH,18);ctx.fill();
  ctx.strokeStyle=accent?"rgba(200,16,46,.4)":"rgba(255,255,255,.08)";
  ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(mx,y,mw,cardH,18);ctx.stroke();

  // Teams
  const midX=W/2,teamY=y+cardH*.42;
  // Local
  drawTeamBadge(ctx,m.l,mx+160,teamY,80);
  ctx.textAlign="center";ctx.font="bold 26px sans-serif";ctx.fillStyle="#eef2f8";
  ctx.fillText(ts(m.l),mx+160,teamY+62);

  // VS or score
  if(scored){
    ctx.font="900 62px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
    ctx.fillText(r.l,midX-50,teamY+22);
    ctx.font="bold 36px sans-serif";ctx.fillStyle="#7a96b4";
    ctx.fillText("-",midX,teamY+22);
    ctx.font="900 62px sans-serif";ctx.fillStyle="#fff";
    ctx.fillText(r.v,midX+50,teamY+22);
  }else{
    ctx.font="bold 32px sans-serif";ctx.fillStyle="rgba(255,255,255,.35)";ctx.textAlign="center";
    ctx.fillText("VS",midX,teamY+12);
  }

  // Visitor
  drawTeamBadge(ctx,m.v,mx+mw-160,teamY,80);
  ctx.textAlign="center";ctx.font="bold 26px sans-serif";ctx.fillStyle="#eef2f8";
  ctx.fillText(ts(m.v),mx+mw-160,teamY+62);

  // Meta info
  const d=new Date(m.fecha+"T12:00:00");
  const days=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const dateStr=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
  ctx.font="600 22px sans-serif";ctx.fillStyle="#7a96b4";ctx.textAlign="center";
  ctx.fillText(`${dateStr}  ·  ${m.hora}  ·  ${m.cancha}`,W/2,y+cardH*.88);
}

function drawFooter(ctx){
  const y=H-160;
  const fg=ctx.createLinearGradient(0,0,W,0);
  fg.addColorStop(0,"transparent");fg.addColorStop(.5,"rgba(200,16,46,.6)");fg.addColorStop(1,"transparent");
  ctx.fillStyle=fg;ctx.fillRect(0,y,W,1.5);
  ctx.font="bold 26px sans-serif";ctx.fillStyle="#7a96b4";ctx.textAlign="center";
  ctx.fillText("fixture.cesarcreps.com",W/2,H-100);
  ctx.font="600 24px sans-serif";ctx.fillStyle="rgba(255,255,255,.3)";
  ctx.fillText("@atleticonortefc",W/2,H-60);
}

function drawJornada(ctx,ms){
  drawBase(ctx);
  drawClubHeader(ctx,60);

  // Jornada title
  const weeks=[...new Set(ms.map(m=>m.week))];
  const wkLabel=weeks.length===1?`JORNADA ${weeks[0]}`:`SEMANAS ${Math.min(...weeks)}-${Math.max(...weeks)}`;
  ctx.fillStyle="#c8102e";ctx.textAlign="center";ctx.font="900 38px sans-serif";
  ctx.fillText(wkLabel,W/2,360);

  // Cards
  const maxCards=Math.min(ms.length,8);
  const cardH=maxCards<=5?190:150;
  const totalH=maxCards*cardH+(maxCards-1)*16;
  let startY=420;
  if(startY+totalH>H-220)startY=Math.max(360,H-220-totalH);

  ms.slice(0,maxCards).forEach((m,i)=>{
    drawMatchCard(ctx,m,startY+i*(cardH+16),cardH,i===0);
  });
  if(ms.length>maxCards){
    ctx.font="600 24px sans-serif";ctx.fillStyle="rgba(255,255,255,.4)";ctx.textAlign="center";
    ctx.fillText(`+ ${ms.length-maxCards} partidos más`,W/2,startY+maxCards*(cardH+16)+10);
  }
  drawFooter(ctx);
}

function drawPartido(ctx,m){
  if(!m)return;
  drawBase(ctx);

  // Big glow behind teams
  const lg=ctx.createRadialGradient(W*.3,H*.5,0,W*.3,H*.5,360);
  lg.addColorStop(0,"rgba(200,16,46,.18)");lg.addColorStop(1,"transparent");
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  const rg2=ctx.createRadialGradient(W*.7,H*.5,0,W*.7,H*.5,360);
  rg2.addColorStop(0,"rgba(14,165,233,.18)");rg2.addColorStop(1,"transparent");
  ctx.fillStyle=rg2;ctx.fillRect(0,0,W,H);

  drawClubHeader(ctx,60);

  // Date
  const d=new Date(m.fecha+"T12:00:00");
  const days=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  ctx.font="700 30px sans-serif";ctx.fillStyle="#f59e0b";ctx.textAlign="center";
  ctx.fillText(`${days[d.getDay()].toUpperCase()} ${d.getDate()} DE ${months[d.getMonth()].toUpperCase()}`,W/2,380);
  ctx.font="600 26px sans-serif";ctx.fillStyle="#7a96b4";
  ctx.fillText(`${m.hora}  ·  ${m.cancha}  ·  Vuelta ${m.vu}`,W/2,424);

  // Teams big
  drawTeamBadge(ctx,m.l,W/2-230,780,220);
  drawTeamBadge(ctx,m.v,W/2+230,780,220);

  ctx.font="900 52px sans-serif";ctx.fillStyle="rgba(255,255,255,.15)";ctx.textAlign="center";
  ctx.fillText("VS",W/2,800);

  ctx.font="900 38px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(tn(m.l).toUpperCase(),W/2-230,1050);ctx.font="bold 26px sans-serif";ctx.fillStyle="#7a96b4";ctx.fillText(ts(m.l),W/2-230,1088);
  ctx.font="900 38px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(tn(m.v).toUpperCase(),W/2+230,1050);ctx.font="bold 26px sans-serif";ctx.fillStyle="#7a96b4";ctx.fillText(ts(m.v),W/2+230,1088);

  // Divider
  const dg=ctx.createLinearGradient(0,0,W,0);
  dg.addColorStop(0,"transparent");dg.addColorStop(.5,"rgba(200,16,46,.7)");dg.addColorStop(1,"transparent");
  ctx.fillStyle=dg;ctx.fillRect(0,1140,W,2);

  ctx.font="700 30px sans-serif";ctx.fillStyle="#7a96b4";ctx.textAlign="center";
  ctx.fillText("LIGA INTERNA · TEMPORADA S2 2026",W/2,1210);

  drawFooter(ctx);
}

function drawResultado(ctx,m){
  if(!m)return;
  const r=results[m.id];
  if(!r||r.l===undefined){alert("Este partido no tiene resultado aún");return;}
  drawBase(ctx);

  // Gold glow
  const gg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,500);
  gg.addColorStop(0,"rgba(245,158,11,.12)");gg.addColorStop(1,"transparent");
  ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);

  drawClubHeader(ctx,60);

  ctx.font="900 34px sans-serif";ctx.fillStyle="#f59e0b";ctx.textAlign="center";
  ctx.fillText("⚽ RESULTADO FINAL",W/2,380);

  drawTeamBadge(ctx,m.l,W/2-260,720,200);
  drawTeamBadge(ctx,m.v,W/2+260,720,200);

  // Score box
  const sbw=340,sbh=160,sbx=W/2-sbw/2,sby=640;
  const sg=ctx.createLinearGradient(sbx,sby,sbx+sbw,sby);
  sg.addColorStop(0,"rgba(200,16,46,.25)");sg.addColorStop(.5,"rgba(245,158,11,.15)");sg.addColorStop(1,"rgba(200,16,46,.25)");
  ctx.fillStyle=sg;ctx.beginPath();ctx.roundRect(sbx,sby,sbw,sbh,20);ctx.fill();
  ctx.strokeStyle="rgba(245,158,11,.4)";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(sbx,sby,sbw,sbh,20);ctx.stroke();

  ctx.font="900 110px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(`${r.l} - ${r.v}`,W/2,sby+sbh*.78);

  ctx.font="bold 36px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(tn(m.l).toUpperCase(),W/2-260,980);
  ctx.font="600 28px sans-serif";ctx.fillStyle="#7a96b4";ctx.fillText(ts(m.l),W/2-260,1018);
  ctx.font="bold 36px sans-serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(tn(m.v).toUpperCase(),W/2+260,980);
  ctx.font="600 28px sans-serif";ctx.fillStyle="#7a96b4";ctx.fillText(ts(m.v),W/2+260,1018);

  const d=new Date(m.fecha+"T12:00:00");
  const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const days=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  ctx.font="600 26px sans-serif";ctx.fillStyle="#7a96b4";ctx.textAlign="center";
  ctx.fillText(`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} · ${m.hora} · ${m.cancha}`,W/2,1080);

  drawFooter(ctx);
}

function drawTabla(ctx){
  // Simple standings image
  drawBase(ctx);
  drawClubHeader(ctx,60);
  ctx.font="900 38px sans-serif";ctx.fillStyle="#c8102e";ctx.textAlign="center";
  ctx.fillText("TABLA DE POSICIONES",W/2,380);
  ctx.font="600 28px sans-serif";ctx.fillStyle="#7a96b4";ctx.textAlign="center";
  ctx.fillText("Liga Interna · S2 2026",W/2,424);

  // Headers
  const cols=[80,260,380,460,540,620,700,780,860,W-80];
  const hdrs=["#","Equipo","PJ","G","E","P","GF","GC","DG","Pts"];
  ctx.font="bold 24px sans-serif";ctx.fillStyle="#7a96b4";
  // (simplified - just show note to use app for full table)
  ctx.fillStyle="rgba(255,255,255,.06)";ctx.beginPath();ctx.roundRect(60,460,W-120,H-640,20);ctx.fill();
  ctx.font="700 28px sans-serif";ctx.fillStyle="rgba(255,255,255,.3)";ctx.textAlign="center";
  ctx.fillText("Ver tabla completa en",W/2,H/2-40);
  ctx.font="bold 36px sans-serif";ctx.fillStyle=var_ac;
  ctx.fillText("fixture.cesarcreps.com",W/2,H/2+10);
  drawFooter(ctx);
}

const var_ac="#0ea5e9";

function buildTopLogo(){
  const cv=document.getElementById("topLogo");
  const ctx=cv.getContext("2d");
  ctx.clearRect(0,0,42,50);
  if(clubLogo){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,42,50);img.src=clubLogo;}
  else{ctx.fillStyle="#c8102e";ctx.beginPath();ctx.roundRect(0,0,42,50,6);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 14px sans-serif";ctx.textAlign="center";ctx.fillText("AN",21,31);}
}

function buildCaption(ms){
  const hashtags=document.getElementById("hashInput").value;
  const weeks=[...new Set(ms.map(m=>m.week))];
  const wk=weeks.length===1?`Jornada ${weeks[0]}`:"Próximas jornadas";
  let txt=`🔥 ${wk} — Liga Interna S2 2026\n`;
  txt+=`🏟️ Atlético Norte F.C.\n\n`;
  ms.slice(0,5).forEach(m=>{
    const d=new Date(m.fecha+"T12:00:00");
    const days=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    txt+=`⚽ ${tn(m.l)} vs ${tn(m.v)}\n`;
    txt+=`📅 ${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} · ${m.hora} · ${m.cancha}\n\n`;
  });
  txt+=hashtags;
  return txt;
}

function download(){
  const cv=document.getElementById("previewCanvas");
  const a=document.createElement("a");
  a.download=`atletico-norte-${curTpl}-${Date.now()}.png`;
  a.href=cv.toDataURL("image/png",1);
  a.click();
}

function copyCaption(){
  const ms=allMatches.filter(m=>selectedMatches.has(m.id));
  generatedCaption=buildCaption(ms);
  navigator.clipboard.writeText(generatedCaption).then(()=>{
    const b=document.getElementById("btnCopy");
    b.textContent="✅ ¡Copiado!";
    setTimeout(()=>b.textContent="📋 Copiar Caption",2000);
  }).catch(()=>{
    prompt("Copia este caption:",generatedCaption);
  });
}
