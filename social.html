<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generador Redes · Atlético Norte F.C.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c18;--b2:#0b1422;--b3:#131f33;--bd:#1e3050;
  --t:#eef2f8;--m:#6b88a8;--rd:#c8102e;--gl:#f59e0b;--gn:#10b981;
  --r:14px;
}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;min-height:100vh;padding-bottom:60px}
.topbar{background:linear-gradient(135deg,#050b18,#0c1d38);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:14px}
.topbar-logo{width:40px;height:48px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:900;letter-spacing:-.3px}
.topbar-title span{color:var(--rd)}
.topbar-sub{font-size:9.5px;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

.wrap{max-width:680px;margin:0 auto;padding:16px}
.sec{font-size:9.5px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}

/* TEMPLATE PILLS */
.tpl-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px}
.tpl-row::-webkit-scrollbar{display:none}
.tpl-btn{flex-shrink:0;background:var(--b3);border:1.5px solid var(--bd);color:var(--m);padding:8px 16px;border-radius:24px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;transition:.15s}
.tpl-btn.active{background:var(--rd);border-color:var(--rd);color:#fff;box-shadow:0 0 14px rgba(200,16,46,.35)}

/* FILTER ROW */
.ctrl-row{display:flex;gap:10px;margin-bottom:12px}
.ctrl-group{flex:1}
.ctrl-label{font-size:9px;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
select,input[type=text]{width:100%;background:var(--b3);border:1.5px solid var(--bd);color:var(--t);padding:9px 12px;border-radius:10px;font-size:13px;font-weight:600;-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:none;border-color:var(--rd)}

/* BG UPLOAD */
.bg-row{display:flex;gap:8px;margin-bottom:12px}
.bg-btn{flex:1;background:var(--b3);border:1.5px dashed var(--bd);color:var(--m);padding:10px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.bg-btn:hover{border-color:var(--gl);color:var(--gl)}
.bg-btn.active{border-color:var(--gl);color:var(--gl);background:rgba(245,158,11,.06)}
.bg-btn.clear{border-style:solid;border-color:#ef4444;color:#ef4444}

/* HASHTAGS */
.hash-row{margin-bottom:14px}

/* GENERATE */
.btn-gen{width:100%;background:linear-gradient(135deg,#c8102e,#e8192d);color:#fff;border:none;padding:14px;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 20px rgba(200,16,46,.4);margin-bottom:8px}
.btn-gen:active{opacity:.9;transform:scale(.99)}
.btn-dl{width:100%;background:linear-gradient(135deg,var(--gn),#059669);color:#fff;border:none;padding:12px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;display:none;margin-bottom:8px}
.btn-copy{width:100%;background:linear-gradient(135deg,var(--gl),#d97706);color:#fff;border:none;padding:12px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;display:none}

/* MATCH LIST */
.match-section{margin-top:18px}
.match-item{background:var(--b2);border:1.5px solid var(--bd);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;margin-bottom:8px}
.match-item.sel{border-color:var(--rd);background:rgba(200,16,46,.07)}
.mi-chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;background:transparent;transition:.15s}
.match-item.sel .mi-chk{background:var(--rd);border-color:var(--rd)}
.mi-teams{font-size:12px;font-weight:800;color:var(--t)}
.mi-meta{font-size:10px;color:var(--m);margin-top:2px}
.date-hdr{font-size:9px;font-weight:900;color:var(--gl);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 4px}
.status-msg{text-align:center;color:var(--m);font-size:12px;padding:16px}

/* PREVIEW */
.preview-wrap{display:flex;justify-content:center;padding:20px 0 0}
#previewCanvas{border-radius:18px;box-shadow:0 12px 50px rgba(0,0,0,.7);max-width:100%;max-height:72vh;object-fit:contain;display:none}

.spinner{display:none;justify-content:center;padding:20px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--rd);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<div class="topbar">
  <canvas class="topbar-logo" id="topLogo" width="40" height="48"></canvas>
  <div>

        <option value="3">Vuelta 3</option>

  <div class="bg-row">

    <button class="tpl-btn" id="bgPitch" onclick="setBgType('pitch',this)">🌿 Cancha</button>

  <!-- ACTION BUTTONS -->

  <button class="btn-dl" id="btnDl" onclick="download()">⬇️ Descargar PNG</button>
  <button class="btn-copy" id="btnCopy" onclick="copyCaption()">📋 Copiar Caption</button>

  <!-- MATCH LIST -->
  <div class="match-section">
    <div class="sec">Seleccionar partidos</div>
    <div id="matchList"><div class="status-msg">Cargando…</div></div>

  <!-- SPINNER -->

  <!-- PREVIEW -->
  <div class="preview-wrap">
    <canvas id="previewCanvas" width="1080" height="1920"></canvas>
  </div>

</div>

buildWeekSelect();
loadMatches();

// ── IMAGE CACHE ──
function preloadImg(src,key){
  return new Promise(res=>{
    if(imgCache[key]&&imgCache[key].complete){res(imgCache[key]);return;}
    const img=new Image();
    img.onload=()=>{imgCache[key]=img;res(img);};
    img.onerror=()=>res(null);
    img.src=src;
  });
}
async function getImg(key){
  return imgCache[key]&&imgCache[key].complete?imgCache[key]:null;
}

// ── BG TYPE ──
function setBgType(t,btn){
  bgType=t;
  document.querySelectorAll('.bg-row .tpl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function loadCustomBg(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    preloadImg(ev.target.result,'custombg').then(img=>{
      customBgImg=img;
      bgType='custom';
      document.getElementById('bgClearBtn').style.display='block';
      document.getElementById('bgUpLbl').classList.add('active');
      document.querySelectorAll('.bg-row .tpl-btn').forEach(b=>b.classList.remove('active'));
    });
  };
  rd.readAsDataURL(f);
  inp.value='';
}
function clearCustomBg(){
  customBgImg=null;bgType='stadium';
  document.getElementById('bgClearBtn').style.display='none';
  document.getElementById('bgUpLbl').classList.remove('active');
}

// ── WEEK SELECT ──
function buildWeekSelect(){
  const weeks=[...new Set(allMatches.map(m=>m.week))].sort((a,b)=>a-b);
  const sel=document.getElementById("selWeek");
  sel.innerHTML='<option value="all">Todas</option>'+weeks.map(w=>`<option value="${w}">Semana ${w}</option>`).join('');
  const today=new Date();
  const upcoming=allMatches.filter(m=>new Date(m.fecha+"T12:00:00")>=today);
  if(upcoming.length>0)sel.value=upcoming[0].week;
}
function loadMatches(){
  const wk=document.getElementById("selWeek").value;
  const vu=parseInt(document.getElementById("selVu").value);
  const ms=allMatches.filter(m=>(wk==="all"||m.week===parseInt(wk))&&(vu===0||m.vu===vu));
  selectedMatches=new Set(ms.map(m=>m.id));
  renderMatchList(ms);
}
function renderMatchList(ms){
  const el=document.getElementById("matchList");
  if(!ms.length){el.innerHTML='<div class="status-msg">Sin partidos para este filtro</div>';return;}
  const byDate={};
  ms.forEach(m=>{if(!byDate[m.fecha])byDate[m.fecha]=[];byDate[m.fecha].push(m);});
  let h='';
  Object.keys(byDate).sort().forEach(dt=>{
    const d=new Date(dt+"T12:00:00");
    const dN=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()];
    const mN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()];
    h+=`<div class="date-hdr">${dN} ${d.getDate()} ${mN}</div>`;
    byDate[dt].forEach(m=>{
      const sel=selectedMatches.has(m.id);
      const r=results[m.id];const sc=r&&r.l!==undefined;
      h+=`<div class="match-item${sel?' sel':''}" onclick="toggleM(${m.id},this)">
        <div class="mi-chk">${sel?'✓':''}</div>
        <div style="flex:1">
          <div class="mi-teams">${tn(m.l)} <span style="color:var(--m);font-weight:400">vs</span> ${tn(m.v)}</div>
          <div class="mi-meta">${m.hora} · ${m.cancha} · V${m.vu}${sc?` · <span style="color:var(--gn)">${r.l}-${r.v}</span>`:''}</div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=h;
}
function toggleM(id,el){
  if(selectedMatches.has(id)){selectedMatches.delete(id);el.classList.remove('sel');el.querySelector('.mi-chk').textContent='';}
  else{selectedMatches.add(id);el.classList.add('sel');el.querySelector('.mi-chk').textContent='✓';}
}
function setTpl(t,btn){

  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));

const W=1080,H=1920;

async function generate(){
  const ms=allMatches.filter(m=>selectedMatches.has(m.id));
  if(!ms.length&&curTpl!=='tabla'){alert("Selecciona al menos un partido");return;}

  document.getElementById('spinner').style.display='flex';
  document.getElementById('previewCanvas').style.display='none';

  // Preload all needed badges
  const ids=[...new Set(ms.flatMap(m=>[m.l,m.v]))];
  await Promise.all(ids.map(id=>custBadges[id]?preloadImg(custBadges[id],'badge_'+id):Promise.resolve()));
  if(clubLogo) await preloadImg(clubLogo,'club');

  const cv=document.getElementById("previewCanvas");
  const ctx=cv.getContext("2d");
  ctx.clearRect(0,0,W,H);

  if(curTpl==='jornada')await drawJornada(ctx,ms);
  else if(curTpl==='partido')await drawPartido(ctx,ms[0]);
  else if(curTpl==='resultado')await drawResultado(ctx,ms[0]);
  else await drawTabla(ctx);

  document.getElementById('spinner').style.display='none';
  cv.style.display='block';
  document.getElementById('btnDl').style.display='block';
  document.getElementById('btnCopy').style.display='block';
  cv.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── BACKGROUND RENDERER ──
async function drawBackground(ctx){
  if(bgType==='custom'&&customBgImg){
    // Cover fit
    const sr=customBgImg.width/customBgImg.height,dr=W/H;
    let sw,sh,sx,sy;
    if(sr>dr){sh=customBgImg.height;sw=sh*dr;sx=(customBgImg.width-sw)/2;sy=0;}
    else{sw=customBgImg.width;sh=sw/dr;sx=0;sy=(customBgImg.height-sh)/2;}
    ctx.drawImage(customBgImg,sx,sy,sw,sh,0,0,W,H);
    // Dark overlay
    ctx.fillStyle='rgba(4,8,18,.72)';ctx.fillRect(0,0,W,H);
    // Gradient vignette
    const vg=ctx.createRadialGradient(W/2,H/2,W*.1,W/2,H/2,W*.9);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.55)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    return;
  }
  if(bgType==='pitch'){
    drawPitchBg(ctx);return;
  }
  if(bgType==='night'){
    drawNightBg(ctx);return;
  }
  // Default: stadium
  drawStadiumBg(ctx);
}

function drawStadiumBg(ctx){
  // Deep atmospheric dark with subtle warmth
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#04080f');
  bg.addColorStop(.35,'#090f1d');
  bg.addColorStop(.7,'#0b1220');
  bg.addColorStop(1,'#060b15');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Big red atmospheric glow top-center
  const rg=ctx.createRadialGradient(W/2,0,0,W/2,0,W*.9);
  rg.addColorStop(0,'rgba(200,16,46,.22)');
  rg.addColorStop(.6,'rgba(200,16,46,.06)');
  rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);

  // Blue cold glow bottom
  const bg2=ctx.createRadialGradient(W/2,H,0,W/2,H,W*.7);
  bg2.addColorStop(0,'rgba(14,80,140,.2)');
  bg2.addColorStop(1,'transparent');
  ctx.fillStyle=bg2;ctx.fillRect(0,0,W,H);

  // Subtle diagonal lines (stadium stands texture)
  ctx.save();ctx.globalAlpha=.025;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  for(let x=-H;x<W+H;x+=40){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.stroke();
  }
  ctx.restore();

  // Faint hexagonal pattern
  drawHexPattern(ctx,.018);
}

function drawPitchBg(ctx){
  // Grass gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020c06');bg.addColorStop(.4,'#041208');bg.addColorStop(.8,'#061508');bg.addColorStop(1,'#020c06');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Pitch stripes
  ctx.save();
  for(let i=0;i<14;i++){
    ctx.fillStyle=i%2===0?'rgba(255,255,255,.018)':'rgba(0,0,0,.02)';
    ctx.fillRect(0,i*(H/14),W,H/14);
  }
  ctx.restore();

  // Center circle
  ctx.save();ctx.globalAlpha=.06;ctx.strokeStyle='#fff';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(W/2,H/2,260,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.restore();

  // Red glow
  const rg=ctx.createRadialGradient(W/2,H*.3,0,W/2,H*.3,600);
  rg.addColorStop(0,'rgba(200,16,46,.18)');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);

  drawHexPattern(ctx,.012);
}

function drawNightBg(ctx){
  // Night sky deep blue
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020512');bg.addColorStop(.5,'#060c1e');bg.addColorStop(1,'#030818');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.save();ctx.globalAlpha=1;
  for(let i=0;i<180;i++){
    const sx=Math.random()*W,sy=Math.random()*(H*.6);
    const sz=Math.random()*1.5+.3;
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*.6+.1})`;
    ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Gold light
  const gg=ctx.createRadialGradient(W/2,0,0,W/2,0,W*.8);
  gg.addColorStop(0,'rgba(245,158,11,.15)');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);

  // Red glow center
  const rg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,480);
  rg.addColorStop(0,'rgba(200,16,46,.2)');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);

  drawHexPattern(ctx,.015);
}

function drawHexPattern(ctx,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#fff';ctx.lineWidth=.8;
  const s=70,h=s*Math.sqrt(3)/2,cols=Math.ceil(W/(s*1.5))+2,rows=Math.ceil(H/(h*2))+2;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols;col++){
      const x=col*s*1.5-s,y=row*h*2+(col%2?h:0)-h;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(x+s*.5*Math.cos(a),y+s*.5*Math.sin(a));}
      ctx.closePath();ctx.stroke();
    }
  }
  ctx.restore();
}

async function drawBadge(ctx,tid,cx,cy,size){
  const img=imgCache['badge_'+tid];

    ctx.save();ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=30;
    ctx.drawImage(img,cx-size/2,cy-size/2,size,size);

    cg.addColorStop(0,'rgba(255,255,255,.12)');cg.addColorStop(1,'rgba(255,255,255,.03)');

// ── DATE HELPERS ──
const DAYS_L=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const DAYS_S=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS_L=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MONTHS_S=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function fmtDate(fecha,long){
  const d=new Date(fecha+"T12:00:00");
  return long?`${DAYS_L[d.getDay()]} ${d.getDate()} de ${MONTHS_L[d.getMonth()]}`.toUpperCase()
             :`${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`;
}

async function drawJornada(ctx,ms){
  await drawBackground(ctx);
  drawTopStripe(ctx);

  drawClubHeader(ctx,60);

  const weeks=[...new Set(ms.map(m=>m.week))];
  const wkLabel=weeks.length===1?`JORNADA ${weeks[0]}`:`SEMANAS ${Math.min(...weeks)}–${Math.max(...weeks)}`;

  // Week badge pill
  const pilW=500,pilH=72,pilX=W/2-pilW/2,pilY=440;
  const pg=ctx.createLinearGradient(pilX,pilY,pilX+pilW,pilY);
  pg.addColorStop(0,'rgba(200,16,46,.0)');pg.addColorStop(.5,'rgba(200,16,46,.25)');pg.addColorStop(1,'rgba(200,16,46,.0)');
  ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(pilX,pilY,pilW,pilH,pilH/2);ctx.fill();
  ctx.strokeStyle='rgba(200,16,46,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(pilX,pilY,pilW,pilH,pilH/2);ctx.stroke();
  ctx.font='900 36px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.letterSpacing='5px';
  ctx.fillText(wkLabel,W/2,pilY+pilH*.66);

  const n=Math.min(ms.length,7);
  const cardH=n<=5?220:182;
  const gap=14;
  const total=n*cardH+(n-1)*gap;
  let sy=Math.max(540,H/2-total/2);
  if(sy+total>H-200)sy=H-200-total;

  for(let i=0;i<n;i++){
    await drawJornadaCard(ctx,ms[i],sy+i*(cardH+gap),cardH,i===0);
  }
  if(ms.length>n){
    ctx.font='600 24px sans-serif';ctx.fillStyle='rgba(255,255,255,.3)';ctx.textAlign='center';ctx.letterSpacing='0px';
    ctx.fillText(`+ ${ms.length-n} partidos más`,W/2,sy+n*(cardH+gap)+16);
  }
  drawFooter(ctx);
}

async function drawJornadaCard(ctx,m,y,h,highlight){
  const mx=64,mw=W-128;
  // Card background
  const cg=ctx.createLinearGradient(mx,y,mx+mw,y+h);
  if(highlight){
    cg.addColorStop(0,'rgba(200,16,46,.18)');cg.addColorStop(1,'rgba(8,20,40,.6)');
  }else{
    cg.addColorStop(0,'rgba(255,255,255,.06)');cg.addColorStop(1,'rgba(8,20,40,.5)');
  }
  ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(mx,y,mw,h,20);ctx.fill();
  // Border
  const bg2=ctx.createLinearGradient(mx,y,mx+mw,y+h);
  bg2.addColorStop(0,highlight?'rgba(200,16,46,.5)':'rgba(255,255,255,.1)');
  bg2.addColorStop(1,'rgba(255,255,255,.04)');
  ctx.strokeStyle=bg2;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(mx,y,mw,h,20);ctx.stroke();

  const cy=y+h*.48;
  const bSize=h*.52;

  // Left team badge
  await drawBadge(ctx,m.l,mx+mw*.24,cy,bSize);
  // Right team badge
  await drawBadge(ctx,m.v,mx+mw*.76,cy,bSize);

  // VS / Score
  const r=results[m.id];const sc=r&&r.l!==undefined;
  if(sc){
    // Score box
    const sx=W/2-80,sw=160,sh=h*.4,ssy=cy-sh/2+4;
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(sx,ssy,sw,sh,12);ctx.fill();
    ctx.font=`900 ${h*.36}px sans-serif`;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.letterSpacing='0';
    ctx.fillText(`${r.l} - ${r.v}`,W/2,ssy+sh*.74);
  }else{
    ctx.font=`900 ${h*.26}px sans-serif`;ctx.fillStyle='rgba(255,255,255,.2)';ctx.textAlign='center';ctx.letterSpacing='2px';
    ctx.fillText('VS',W/2,cy+h*.1);
  }

  // Team names below badges
  const fy=y+h*.84;
  ctx.font=`800 ${h*.13}px sans-serif`;ctx.fillStyle='rgba(255,255,255,.85)';ctx.textAlign='center';ctx.letterSpacing='0';
  ctx.fillText(ts(m.l),mx+mw*.24,fy);
  ctx.fillText(ts(m.v),mx+mw*.76,fy);

  // Meta bottom
  ctx.font=`600 ${h*.1}px sans-serif`;ctx.fillStyle='rgba(255,255,255,.38)';ctx.textAlign='center';
  ctx.fillText(`${fmtDate(m.fecha,false)}  ·  ${m.hora}  ·  ${m.cancha}`,W/2,y+h*.96);
}

  const rpg=ctx.createLinearGradient(W/2-rW/2,rby-rH*.7,W/2+rW/2,rby+10);
  rpg.addColorStop(0,'rgba(245,158,11,.15)');rpg.addColorStop(.5,'rgba(245,158,11,.28)');rpg.addColorStop(1,'rgba(245,158,11,.15)');
  ctx.fillStyle=rpg;ctx.beginPath();ctx.roundRect(W/2-rW/2,rby-rH*.8,rW,rH,rH/2);ctx.fill();
  ctx.strokeStyle='rgba(245,158,11,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(W/2-rW/2,rby-rH*.8,rW,rH,rH/2);ctx.stroke();
  ctx.fillStyle='#f59e0b';ctx.fillText(rb,W/2,rby);

  drawDivider(ctx,470);

  // Date
  ctx.font='600 28px sans-serif';ctx.fillStyle='rgba(255,255,255,.45)';ctx.letterSpacing='1px';
  ctx.fillText(`${fmtDate(m.fecha,false)}  ·  ${m.hora}  ·  ${m.cancha}`,W/2,520);

  // Teams + Score
  const midY=H*.52;

  await drawBadge(ctx,m.l,W*.2,midY,280);
  await drawBadge(ctx,m.v,W*.8,midY,280);

  // Score BOX
  const sbW=380,sbH=180,sbX=W/2-sbW/2,sbY=midY-sbH*.5;
  const sbg=ctx.createLinearGradient(sbX,sbY,sbX+sbW,sbY+sbH);
  sbg.addColorStop(0,'rgba(200,16,46,.3)');sbg.addColorStop(.5,'rgba(120,10,25,.4)');sbg.addColorStop(1,'rgba(200,16,46,.3)');
  ctx.fillStyle=sbg;ctx.beginPath();ctx.roundRect(sbX,sbY,sbW,sbH,24);ctx.fill();
  ctx.strokeStyle='rgba(245,158,11,.5)';ctx.lineWidth=2.5;ctx.beginPath();ctx.roundRect(sbX,sbY,sbW,sbH,24);ctx.stroke();

  // Glow inside score box
  const ig=ctx.createRadialGradient(W/2,midY,0,W/2,midY,160);
  ig.addColorStop(0,'rgba(255,255,255,.08)');ig.addColorStop(1,'transparent');
  ctx.fillStyle=ig;ctx.beginPath();ctx.roundRect(sbX,sbY,sbW,sbH,24);ctx.fill();

  ctx.font='900 120px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.letterSpacing='-2px';
  ctx.fillText(`${r.l} - ${r.v}`,W/2,midY);ctx.textBaseline='alphabetic';

  // Winner label
  const winId=r.l>r.v?m.l:(r.v>r.l?m.v:null);
  if(winId){
    ctx.font='700 28px sans-serif';ctx.fillStyle='#f59e0b';ctx.textAlign='center';ctx.letterSpacing='2px';
    ctx.fillText(`🏆 ${tn(winId).toUpperCase()} GANA`,W/2,midY+sbH*.5+54);
  }else{
    ctx.font='700 28px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.textAlign='center';
    ctx.fillText('EMPATE',W/2,midY+sbH*.5+54);
  }

  // Team names
  const ny=midY+190;
  ctx.font='900 38px sans-serif';ctx.fillStyle='#fff';ctx.letterSpacing='1px';
  ctx.textAlign='center';
  ctx.fillText(tn(m.l).toUpperCase(),W*.2,ny);
  ctx.font='700 28px sans-serif';ctx.fillStyle='#f59e0b';ctx.letterSpacing='2px';
  ctx.fillText(ts(m.l),W*.2,ny+42);
  ctx.font='900 38px sans-serif';ctx.fillStyle='#fff';ctx.letterSpacing='1px';
  ctx.fillText(tn(m.v).toUpperCase(),W*.8,ny);
  ctx.font='700 28px sans-serif';ctx.fillStyle='#f59e0b';ctx.letterSpacing='2px';
  ctx.fillText(ts(m.v),W*.8,ny+42);

  drawFooter(ctx);
}

// ══ TEMPLATE: TABLA ══
async function drawTabla(ctx){
  await drawBackground(ctx);
  drawTopStripe(ctx);
  drawClubHeader(ctx,55);

  ctx.font='900 40px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.letterSpacing='4px';
  ctx.fillText('TABLA DE POSICIONES',W/2,440);
  ctx.font='700 26px sans-serif';ctx.fillStyle='#f59e0b';ctx.letterSpacing='3px';
  ctx.fillText('LIGA INTERNA · S2 2026',W/2,484);
  drawDivider(ctx,510);

  // Build standings from results
  const st={};for(let i=1;i<=10;i++)st[i]={id:i,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
  Object.values(results).forEach(r=>{
    if(r.l===undefined||r.v===undefined)return;
    const m=allMatches.find(x=>x.id===r.id);if(!m)return;
    const [lc,vc]=[m.l,m.v];
    if(!st[lc]||!st[vc])return;
    st[lc].pj++;st[vc].pj++;
    st[lc].gf+=r.l;st[lc].gc+=r.v;
    st[vc].gf+=r.v;st[vc].gc+=r.l;
    if(r.l>r.v){st[lc].g++;st[lc].pts+=3;st[vc].p++;}
    else if(r.l<r.v){st[vc].g++;st[vc].pts+=3;st[lc].p++;}
    else{st[lc].e++;st[vc].e++;st[lc].pts++;st[vc].pts++;}
  });
  const sorted=Object.values(st).sort((a,b)=>b.pts-a.pts||b.g-a.g||(b.gf-b.gc)-(a.gf-a.gc));

  const rowH=115,tStartY=540,tX=50,tW=W-100;
  const cols={pos:50,badge:130,name:300,pj:560,g:640,e:710,p:780,dg:860,pts:960};
  const hdrY=tStartY+42;

  // Header row
  ctx.fillStyle='rgba(200,16,46,.15)';ctx.beginPath();ctx.roundRect(tX,tStartY,tW,56,12);ctx.fill();
  ctx.strokeStyle='rgba(200,16,46,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(tX,tStartY,tW,56,12);ctx.stroke();
  ctx.font='800 24px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.letterSpacing='1px';
  const hdrs=[['#',cols.pos],['',cols.badge],['Equipo',cols.name],['PJ',cols.pj],['G',cols.g],['E',cols.e],['P',cols.p],['DG',cols.dg],['Pts',cols.pts]];
  hdrs.forEach(([t,x])=>{ctx.textAlign=x===cols.name?'left':'center';ctx.fillText(t,x,hdrY);});

  for(let i=0;i<Math.min(sorted.length,10);i++){
    const t=sorted[i];const ry=tStartY+56+i*rowH;
    const even=i%2===0;
    ctx.fillStyle=even?'rgba(255,255,255,.04)':'rgba(0,0,0,.15)';
    ctx.beginPath();ctx.roundRect(tX,ry,tW,rowH,8);ctx.fill();
    if(i<3){
      const ac=i===0?'#f59e0b':i===1?'rgba(192,192,200,.6)':'rgba(180,120,60,.6)';
      ctx.fillStyle=ac;ctx.fillRect(tX,ry+rowH*.15,3,rowH*.7);
    }
    const midY=ry+rowH/2;

    // Position
    ctx.font='900 30px sans-serif';ctx.fillStyle=i<3?'#f59e0b':'rgba(255,255,255,.6)';ctx.textAlign='center';ctx.letterSpacing='0';
    ctx.fillText(i+1,cols.pos,midY+10);

    // Badge
    await drawBadge(ctx,t.id,cols.badge,midY,70);

    // Team name
    ctx.font='800 28px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.letterSpacing='0';
    ctx.fillText(tn(t.id),cols.name,midY+10);

    // Stats
    ctx.font='700 28px sans-serif';ctx.textAlign='center';
    [[t.pj,cols.pj,'rgba(255,255,255,.6)'],[t.g,cols.g,'#10b981'],[t.e,cols.e,'rgba(255,255,255,.5)'],[t.p,cols.p,'#ef4444'],
     [t.gf-t.gc,cols.dg,t.gf-t.gc>=0?'#10b981':'#ef4444'],[t.pts,cols.pts,'#f59e0b']].forEach(([v,x,c])=>{
      ctx.fillStyle=c;ctx.fillText(v,x,midY+10);
    });
  }

  drawFooter(ctx);
}

// ── DOWNLOAD & COPY ──
function download(){
  const cv=document.getElementById("previewCanvas");
  const a=document.createElement("a");
  a.download=`atletico-norte-${curTpl}-${Date.now()}.png`;
  a.href=cv.toDataURL("image/png",1);a.click();
}
function copyCaption(){
  const ms=allMatches.filter(m=>selectedMatches.has(m.id));
  const hashtags=document.getElementById("hashInput").value;
  const weeks=[...new Set(ms.map(m=>m.week))];
  let txt='';
  if(curTpl==='resultado'){
    const m=ms[0];const r=results[m?.id];
    if(m&&r){txt=`⚽ Resultado Final\n${tn(m.l)} ${r.l} - ${r.v} ${tn(m.v)}\n${fmtDate(m.fecha,true)}\n\n`;}
  }else if(curTpl==='partido'){
    const m=ms[0];
    if(m){txt=`⚽ Próximo Partido\n${tn(m.l)} vs ${tn(m.v)}\n📅 ${fmtDate(m.fecha,true)}\n🕐 ${m.hora} · ${m.cancha}\n\n`;}
  }else{
    const wk=weeks.length===1?`Jornada ${weeks[0]}`:'Próximas jornadas';
    txt=`🔥 ${wk} — Liga Interna S2 2026\n🏟️ Atlético Norte F.C.\n\n`;
    ms.slice(0,5).forEach(m=>{txt+=`⚽ ${tn(m.l)} vs ${tn(m.v)}\n📅 ${fmtDate(m.fecha,false)} · ${m.hora} · ${m.cancha}\n\n`;});
  }
  txt+=hashtags;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById("btnCopy");b.textContent="✅ ¡Copiado!";
    setTimeout(()=>b.textContent="📋 Copiar Caption",2000);
  }).catch(()=>prompt("Copia este caption:",txt));
}
